<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイマーアプリ</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --text-muted: #64748b;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .timer-container {
            background-color: var(--surface-color);
            padding: 3rem 4rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 320px;
        }

        .time-display {
            font-size: 5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            font-variant-numeric: tabular-nums;
            color: var(--accent-color);
            text-shadow: 0 0 40px rgba(56, 189, 248, 0.3);
            transition: color 0.3s ease;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        button {
            background-color: transparent;
            border: 2px solid var(--text-muted);
            color: var(--text-color);
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: var(--text-color);
        }

        button.active {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }

        .input-group {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            align-items: center;
        }

        input {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--text-muted);
            color: var(--text-color);
            padding: 0.5rem;
            border-radius: 0.5rem;
            width: 60px;
            text-align: center;
            font-size: 1.2rem;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .input-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="timer-container">
        <div class="time-display" id="timer">05:00</div>

        <div class="controls">
            <button id="startBtn" onclick="toggleTimer()">スタート</button>
            <button id="resetBtn" onclick="resetTimer()">リセット</button>
        </div>

        <div class="input-group" id="inputSection">
            <input type="number" id="minutesInput" min="0" max="99" value="5">
            <span class="input-label">分</span>
        </div>
    </div>

    <script>
        let timeLeft = 300;
        let timerId = null;
        let isRunning = false;

        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const inputSection = document.getElementById('inputSection');
        const minutesInput = document.getElementById('minutesInput');

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            document.title = `${timerDisplay.textContent} - Timer`;
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerId);
                startBtn.textContent = 'スタート';
                startBtn.classList.remove('active');
                isRunning = false;
                inputSection.style.display = 'flex';
            } else {
                if (timeLeft === 0) return;

                // 初回スタート時にインプットの値を反映
                if (!timerId) {
                    const mins = parseInt(minutesInput.value) || 0;
                    const secs = 0;
                    timeLeft = (mins * 60) + secs;
                    if (timeLeft === 0) return;
                }

                inputSection.style.display = 'none';
                startBtn.textContent = '一時停止';
                startBtn.classList.add('active');
                isRunning = true;

                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();

                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        timerId = null;
                        isRunning = false;
                        startBtn.textContent = 'スタート';
                        startBtn.classList.remove('active');
                        inputSection.style.display = 'flex';
                        alert('時間です！');
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            timerId = null;
            isRunning = false;
            const mins = parseInt(minutesInput.value) || 5;
            timeLeft = mins * 60;
            updateDisplay();
            startBtn.textContent = 'スタート';
            startBtn.classList.remove('active');
            inputSection.style.display = 'flex';
        }
    </script>
</body>

</html>
